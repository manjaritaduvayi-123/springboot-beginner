<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile Card</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/site.css">
    <link rel="stylesheet" href="css/card.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <a href="index.html">
            Home
        </a>

        <a class="active" href="card.html">
            Card
        </a>

        <!-- NAVBAR TOGGLE -->
        <a href="#"
           onclick="toggleUser()">
            Toggle
        </a>

        <a href="#">
            Contact
        </a>

    </div>


    <!-- PROFILE CARD -->
    <div class="card">

        <!-- IMAGE -->
        <img
            id="userImage"
            src="img/john_doe.png"
            alt="Profile"
        >

        <!-- CARD CONTENT -->
        <div class="card-content">

            <!-- NAME -->
            <h2 id="userName">
                John Doe
            </h2>

            <!-- GENDER -->
            <p id="userGender">
                Male
            </p>

            <!-- CARD TOGGLE BUTTON -->
            <button onclick="toggleUser()">
                Toggle
            </button>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="js/toggle.js"></script>

</body>

</html>
